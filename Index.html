<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- i forgot viewport for a bit but then added it lol -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kali Linux Commands - My Dictionary</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* reset some stuff */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            /* tried to make it look like a terminal */
            background-image: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 65, 0.02) 0px,
                rgba(0, 255, 65, 0.02) 1px,
                transparent 1px,
                transparent 4px
            );
        }

        /* header */
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            border-bottom: 1px solid #00ff4133;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: #00ff41;
            text-shadow: 0 0 20px #00ff41, 0 0 40px #00ff4166;
            letter-spacing: 4px;
            /* animation i found on stack overflow */
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 95%, 100% { opacity: 1; }
            96% { opacity: 0.4; }
            97% { opacity: 1; }
            98% { opacity: 0.2; }
            99% { opacity: 1; }
        }

        .header p {
            color: #00ff4199;
            margin-top: 8px;
            font-size: 0.85rem;
        }

        /* this is the blinking cursor thing */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.1em;
            background: #00ff41;
            vertical-align: text-bottom;
            animation: blink 1s steps(1) infinite;
            margin-left: 3px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* search area */
        .search-container {
            max-width: 750px;
            margin: 40px auto 20px;
            padding: 0 20px;
        }

        .search-box-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #00ff41;
            border-radius: 4px;
            background: #0d1a0d;
            box-shadow: 0 0 15px #00ff4122, inset 0 0 20px #00ff410a;
            overflow: hidden;
        }

        .prompt-label {
            padding: 12px 14px;
            color: #00ff41;
            font-size: 1rem;
            user-select: none;
            border-right: 1px solid #00ff4133;
            white-space: nowrap;
        }

        #searchInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            padding: 12px 14px;
            caret-color: #00ff41;
        }

        #searchInput::placeholder {
            color: #00ff4144;
        }

        /* i added a clear button later */
        #clearBtn {
            background: transparent;
            border: none;
            color: #00ff4166;
            cursor: pointer;
            padding: 12px 14px;
            font-size: 1rem;
            font-family: 'Share Tech Mono', monospace;
            transition: color 0.2s;
        }

        #clearBtn:hover {
            color: #ff4444;
        }

        .filter-row {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid #00ff4144;
            color: #00ff4199;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.78rem;
            padding: 5px 12px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #00ff4122;
            border-color: #00ff41;
            color: #00ff41;
            box-shadow: 0 0 8px #00ff4133;
        }

        /* result count */
        .result-meta {
            max-width: 750px;
            margin: 10px auto 0;
            padding: 0 20px;
            font-size: 0.78rem;
            color: #00ff4166;
        }

        /* the main list of commands */
        .results-container {
            max-width: 750px;
            margin: 20px auto 60px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cmd-card {
            border: 1px solid #00ff4133;
            border-radius: 4px;
            background: #0d1a0d;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .cmd-card:hover {
            border-color: #00ff41;
            box-shadow: 0 0 16px #00ff4122;
        }

        /* card header clickable */
        .cmd-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            gap: 12px;
        }

        .cmd-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: #00ff41;
            letter-spacing: 1px;
        }

        .cmd-short {
            color: #00ff4199;
            font-size: 0.82rem;
            flex: 1;
            /* cut off long text */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cmd-tag {
            font-size: 0.7rem;
            padding: 3px 8px;
            border: 1px solid;
            border-radius: 2px;
            white-space: nowrap;
        }

        /* color coded tags - i looked up which category each cmd belongs to */
        .tag-network { color: #00bfff; border-color: #00bfff66; }
        .tag-recon   { color: #ff9500; border-color: #ff950066; }
        .tag-exploit { color: #ff4444; border-color: #ff444466; }
        .tag-file    { color: #c8ff00; border-color: #c8ff0066; }
        .tag-system  { color: #cc88ff; border-color: #cc88ff66; }
        .tag-password{ color: #ff69b4; border-color: #ff69b466; }
        .tag-wireless{ color: #00ffcc; border-color: #00ffcc66; }

        .expand-icon {
            color: #00ff4166;
            font-size: 0.9rem;
            transition: transform 0.25s;
            flex-shrink: 0;
        }

        /* expanded body */
        .cmd-body {
            display: none;
            padding: 0 18px 18px;
            border-top: 1px solid #00ff4122;
        }

        .cmd-body.open {
            display: block;
        }

        .expand-icon.rotated {
            transform: rotate(180deg);
        }

        .section-label {
            color: #00ff4166;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 14px 0 5px;
        }

        .cmd-description {
            color: #ccffcc;
            font-size: 0.88rem;
            line-height: 1.7;
        }

        /* syntax block */
        .syntax-block {
            background: #060f06;
            border: 1px solid #00ff4133;
            border-left: 3px solid #00ff41;
            border-radius: 3px;
            padding: 10px 14px;
            font-size: 0.88rem;
            color: #00ff41;
            margin-top: 4px;
            overflow-x: auto;
        }

        /* options table */
        .options-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
            font-size: 0.82rem;
        }

        .options-table td {
            padding: 6px 8px;
            border-bottom: 1px solid #00ff410f;
            vertical-align: top;
        }

        .options-table td:first-child {
            color: #00ff41;
            white-space: nowrap;
            width: 120px;
        }

        .options-table td:last-child {
            color: #aaffaa;
        }

        /* example block */
        .example-block {
            background: #060f06;
            border: 1px solid #00ff4122;
            border-radius: 3px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #88ff88;
            margin-top: 4px;
            overflow-x: auto;
        }

        .example-block span.comment {
            color: #00ff4155;
        }

        /* warning box - some commands are dangerous */
        .warning-box {
            background: #1a0a00;
            border: 1px solid #ff950066;
            border-radius: 3px;
            padding: 8px 12px;
            color: #ff9500;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        /* no results */
        .no-results {
            text-align: center;
            color: #00ff4155;
            padding: 60px 20px;
            font-size: 0.9rem;
        }

        .no-results span {
            display: block;
            font-size: 2rem;
            margin-bottom: 14px;
        }

        /* footer */
        footer {
            text-align: center;
            padding: 20px;
            color: #00ff4133;
            font-size: 0.75rem;
            border-top: 1px solid #00ff4111;
        }

        /* scrollbar styling - optional but looks cool */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #00ff4133; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00ff4166; }
    </style>
</head>
<body>

<div class="header">
    <h1>&gt; KALI LINUX COMMANDS<span class="cursor"></span></h1>
    <p>// a dictionary of common kali linux / pentesting commands — made for beginners like me</p>
</div>

<div class="search-container">
    <div class="search-box-wrapper">
        <span class="prompt-label">root@kali:~$</span>
        <input type="text" id="searchInput" placeholder="type a command name or keyword..." autocomplete="off" spellcheck="false">
        <button id="clearBtn" title="clear">✕</button>
    </div>
    <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="network">Network</button>
        <button class="filter-btn" data-filter="recon">Recon</button>
        <button class="filter-btn" data-filter="exploit">Exploit</button>
        <button class="filter-btn" data-filter="file">File</button>
        <button class="filter-btn" data-filter="system">System</button>
        <button class="filter-btn" data-filter="password">Password</button>
        <button class="filter-btn" data-filter="wireless">Wireless</button>
    </div>
</div>

<div class="result-meta" id="resultMeta"></div>
<div class="results-container" id="resultsContainer"></div>

<footer>
    made by me as a study project — not responsible for misuse, use ethically and on systems u own 🐱
</footer>

    // --- state ---
    let activeFilter = "all";
    let searchQuery = "";

    // --- get elements ---
    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const resultsContainer = document.getElementById("resultsContainer");
    const resultMeta = document.getElementById("resultMeta");

    // filter buttons
    document.getElementById("filterRow").addEventListener("click", function(e) {
        if (e.target.classList.contains("filter-btn")) {
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            e.target.classList.add("active");
            activeFilter = e.target.dataset.filter;
            render();
        }
    });

    searchInput.addEventListener("input", function() {
        searchQuery = this.value.trim().toLowerCase();
        render();
    });

    clearBtn.addEventListener("click", function() {
        searchInput.value = "";
        searchQuery = "";
        render();
        searchInput.focus();
    });

    function getFiltered() {
        return commands.filter(function(cmd) {
            // filter by category
            var catMatch = activeFilter === "all" || cmd.tag === activeFilter;
            if (!catMatch) return false;

            // filter by search query
            if (searchQuery === "") return true;

            // search in name, short desc, description, options
            var haystack = cmd.name.toLowerCase()
                + " " + cmd.short.toLowerCase()
                + " " + cmd.description.toLowerCase()
                + " " + cmd.options.map(o => o[0] + " " + o[1]).join(" ").toLowerCase();

            return haystack.indexOf(searchQuery) !== -1;
        });
    }

    function render() {
        var filtered = getFiltered();
        resultsContainer.innerHTML = "";

        // update meta text
        if (searchQuery !== "" || activeFilter !== "all") {
            resultMeta.textContent = "// showing " + filtered.length + " of " + commands.length + " commands";
        } else {
            resultMeta.textContent = "// " + commands.length + " commands total — click a card to expand";
        }

        if (filtered.length === 0) {
            resultsContainer.innerHTML = '<div class="no-results"><span>?</span>no commands found for "' + escapeHtml(searchQuery) + '"<br>try a different keyword</div>';
            return;
        }

        filtered.forEach(function(cmd) {
            var card = buildCard(cmd);
            resultsContainer.appendChild(card);
        });
    }

    function buildCard(cmd) {
        var card = document.createElement("div");
        card.className = "cmd-card";

        // build options rows html
        var optionsHtml = "";
        if (cmd.options.length > 0) {
            optionsHtml = '<p class="section-label">Common Options</p><table class="options-table">';
            cmd.options.forEach(function(opt) {
                optionsHtml += "<tr><td>" + escapeHtml(opt[0]) + "</td><td>" + escapeHtml(opt[1]) + "</td></tr>";
            });
            optionsHtml += "</table>";
        }

        // warning html
        var warningHtml = cmd.warning ? '<div class="warning-box">' + escapeHtml(cmd.warning) + '</div>' : "";

        card.innerHTML = 
            '<div class="cmd-header">' +
                '<span class="cmd-name">' + escapeHtml(cmd.name) + '</span>' +
                '<span class="cmd-short">' + escapeHtml(cmd.short) + '</span>' +
                '<span class="cmd-tag tag-' + cmd.tag + '">' + cmd.tag + '</span>' +
                '<span class="expand-icon">▼</span>' +
            '</div>' +
            '<div class="cmd-body">' +
                '<p class="section-label">What it does</p>' +
                '<p class="cmd-description">' + escapeHtml(cmd.description) + '</p>' +
                '<p class="section-label">Syntax</p>' +
                '<div class="syntax-block">' + escapeHtml(cmd.syntax) + '</div>' +
                optionsHtml +
                '<p class="section-label">Example</p>' +
                '<div class="example-block">' + cmd.example + '</div>' +
                warningHtml +
            '</div>';

        // toggle on click
        card.querySelector(".cmd-header").addEventListener("click", function() {
            var body = card.querySelector(".cmd-body");
            var icon = card.querySelector(".expand-icon");
            body.classList.toggle("open");
            icon.classList.toggle("rotated");
        });

        return card;
    }

    // i should probably sanitize input properly but this is a basic helper for now
    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    // run on load
    render();

    // auto focus search
    searchInput.focus();
</script>
